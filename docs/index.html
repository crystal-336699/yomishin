<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>読新 — 일본 뉴스 리더</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#1a1410;--ink2:#3d3530;--red:#c0392b;--gold:#b8860b;--bd:#e8e2d8;--warm:#f7f3ee}
body{font-family:'Noto Serif JP',serif;background:#fff;color:var(--ink);max-width:800px;margin:0 auto}

.hdr{background:#fff;border-bottom:1px solid var(--bd);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 5px rgba(0,0,0,.06)}
.logo{font-size:20px;font-weight:700;letter-spacing:.04em;color:var(--ink);display:flex;align-items:baseline;gap:7px}
.logo-sub{font-size:9px;font-family:'Noto Sans KR',sans-serif;font-weight:400;color:#bbb;letter-spacing:.15em}
.hdr-r{display:flex;gap:7px;align-items:center}
.btn{font-family:'Noto Sans KR',sans-serif;font-size:10px;padding:4px 11px;border-radius:16px;border:1px solid #ddd;background:#fff;color:#888;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn:hover{background:var(--warm)}
.btn.on{background:var(--red);border-color:var(--red);color:#fff}
.btn.refresh{border-color:var(--red);color:var(--red)}
.btn.refresh:hover{background:var(--red);color:#fff}
.btn.refresh.spinning .ri{display:inline-block;animation:rot .6s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.btn.back{display:none}
.btn.back.show{display:block}

.cat-row{background:#fff;border-bottom:1px solid var(--bd);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:54px;z-index:99}
.cat-row::-webkit-scrollbar{display:none}
.cat-tab{padding:8px 13px;font-size:10px;font-family:'Noto Sans KR',sans-serif;font-weight:500;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:all .15s}
.cat-tab.on{color:var(--red);border-bottom-color:var(--red);font-weight:600}

/* ── 목록 ── */
#listView{display:block}
#articleView{display:none}

.list-info{padding:7px 16px;font-size:10px;font-family:'Noto Sans KR',sans-serif;color:#aaa;background:var(--warm);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;position:sticky;top:93px;z-index:97}
.cnt{background:#e8e2d8;border-radius:8px;padding:1px 7px;font-weight:600;color:#888}
.updated-tag{font-size:9px;color:#ccc}

.news-row{padding:15px 16px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.news-row:hover,.news-row:active{background:var(--warm)}
.row-top{display:flex;align-items:center;gap:7px;margin-bottom:6px;flex-wrap:wrap}
.row-cat{font-size:8px;font-family:'Noto Sans KR',sans-serif;font-weight:700;padding:2px 7px;border-radius:3px}
.row-src{font-size:9px;font-family:'Noto Sans KR',sans-serif;font-weight:600}
.row-date{font-size:9px;font-family:'Noto Sans KR',sans-serif;color:#bbb;margin-left:auto}
.row-title{font-size:14.5px;font-weight:700;line-height:1.65}

/* ── 기사 뷰 ── */
.art-wrap{padding:24px 20px 52px}
.art-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.art-catb{font-size:9px;font-family:'Noto Sans KR',sans-serif;font-weight:700;padding:3px 9px;border-radius:3px}
.art-srcb{font-size:9px;font-family:'Noto Sans KR',sans-serif;font-weight:700;color:#fff;padding:3px 9px;border-radius:2px}
.art-date{font-size:11px;font-family:'Noto Sans KR',sans-serif;color:#aaa}
.art-title{font-size:22px;font-weight:700;line-height:1.55;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid var(--ink)}
.art-body{font-size:14px;line-height:2.35;color:var(--ink2)}
.art-body p{margin-bottom:16px}
.src-link{display:inline-flex;align-items:center;gap:7px;margin:18px 0 5px;background:var(--warm);color:var(--ink);font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;padding:9px 16px;border-radius:6px;text-decoration:none;border:1px solid var(--bd);transition:background .15s}
.src-link:hover{background:#eee}
.src-link-note{font-size:10px;font-family:'Noto Sans KR',sans-serif;color:#bbb}

/* ── 로딩 ── */
.loading{padding:56px 16px;text-align:center;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:#aaa;line-height:2.4}
.sp{width:28px;height:28px;border:3px solid #eee;border-top-color:var(--red);border-radius:50%;animation:rot .7s linear infinite;margin:0 auto 12px}
.empty{padding:40px 16px;text-align:center;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:#bbb;line-height:2}
.err{margin:14px;padding:14px 16px;background:#fff5f5;border:1px solid #fcc;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:#a00;line-height:1.9}

/* ── 후리가나 ── */
ruby{ruby-position:over}
rt{font-size:.5em;color:var(--red);font-weight:400;transition:opacity .2s}
body.nofuri rt{opacity:0}
.w{cursor:pointer;border-radius:2px;transition:background .12s}
.w:hover{background:rgba(192,57,43,.1)}

/* ── 사전 팝업 ── */
.dp{display:none;position:fixed;z-index:200;background:#1a1410;color:#fff;border-radius:10px;min-width:268px;max-width:320px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.3);animation:pop .16s cubic-bezier(.34,1.5,.64,1)}
@keyframes pop{from{transform:scale(.88) translateY(6px);opacity:0}to{transform:scale(1);opacity:1}}
.dp.show{display:block}
.dp-hdr{padding:12px 14px 8px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;padding-right:24px}
.dp-word{font-size:21px;font-weight:700}
.dp-read{font-size:12px;color:#e74c3c}
.dp-pos{font-size:9px;font-family:'Noto Sans KR',sans-serif;background:rgba(255,255,255,.1);color:rgba(255,255,255,.5);padding:2px 6px;border-radius:8px}
.dp-body{padding:10px 14px 13px}
.dp-row{display:flex;gap:7px;margin-bottom:5px}
.dp-n{font-size:9px;font-family:'Noto Sans KR',sans-serif;color:#e74c3c;font-weight:700;min-width:12px;margin-top:3px}
.dp-ko{font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:500;line-height:1.55}
.dp-ja{font-size:10px;color:rgba(255,255,255,.36);margin-top:1px}
.dp-ex{margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08)}
.dp-exl{font-size:9px;font-family:'Noto Sans KR',sans-serif;letter-spacing:.1em;color:rgba(255,255,255,.25);margin-bottom:3px}
.dp-ej{font-size:11px;color:rgba(255,255,255,.6);line-height:1.6;margin-bottom:2px}
.dp-ek{font-size:10px;font-family:'Noto Sans KR',sans-serif;color:rgba(255,255,255,.34);line-height:1.6}
.dp-x{position:absolute;top:7px;right:8px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.26);font-size:14px;border-radius:50%}
.dp-x:hover{background:rgba(255,255,255,.1);color:#fff}
.credit{font-size:10px;font-family:'Noto Sans KR',sans-serif;color:#bbb;padding:10px 16px;border-top:1px solid var(--bd);background:var(--warm);text-align:center;line-height:1.8}
.credit a{color:#aaa}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">読新<span class="logo-sub">일본 뉴스 리더</span></div>
  <div class="hdr-r">
    <div class="btn back" id="backBtn" onclick="goBack()">← 목록</div>
    <div class="btn refresh" id="refreshBtn" onclick="loadNews()"><span class="ri">↻</span> 새로고침</div>
    <div class="btn on" id="furiBtn" onclick="toggleFuri()">あ ON</div>
  </div>
</div>

<div class="cat-row">
  <div class="cat-tab on"  data-c="all"          onclick="setCat(this)">전체</div>
  <div class="cat-tab"     data-c="politics"     onclick="setCat(this)">🏛️ 정치·외교</div>
  <div class="cat-tab"     data-c="economy"      onclick="setCat(this)">💹 경제</div>
  <div class="cat-tab"     data-c="society"      onclick="setCat(this)">🏙️ 사회</div>
  <div class="cat-tab"     data-c="international"onclick="setCat(this)">🌏 국제</div>
  <div class="cat-tab"     data-c="sports"       onclick="setCat(this)">⚾ 스포츠</div>
  <div class="cat-tab"     data-c="science"      onclick="setCat(this)">🔬 과학·기술</div>
</div>

<div id="listView">
  <div class="list-info">
    <span id="listLabel">전체 기사</span>
    <span style="display:flex;gap:8px;align-items:center">
      <span class="updated-tag" id="updatedTag"></span>
      <span class="cnt" id="listCnt">0</span>
    </span>
  </div>
  <div id="newsList">
    <div class="loading"><div class="sp"></div>기사를 불러오는 중…</div>
  </div>
  <div class="credit">
    뉴스 출처: NHK・livedoor・時事通信・共同通信 등<br>
    매일 오전 8시(JST) 자동 업데이트 · <a href="https://github.com/YOUR_USERNAME/yomishin" target="_blank">GitHub</a>
  </div>
</div>

<div id="articleView">
  <div class="art-wrap" id="artContent"></div>
</div>

<div class="dp" id="dp">
  <div class="dp-x" onclick="closeDp()">✕</div>
  <div id="dpInner"></div>
</div>

<script>
/* ══ 메타 ══ */
const CAT_META={
  all:{label:'전체',color:'#555'},
  politics:{label:'정치·외교',color:'#1a3a5c'},
  economy:{label:'경제',color:'#1a6640'},
  society:{label:'사회',color:'#7a3b00'},
  international:{label:'국제',color:'#5a1a6b'},
  sports:{label:'스포츠',color:'#8b0000'},
  science:{label:'과학·기술',color:'#005a7a'},
};
const SRC_META={
  nhk:    {label:'NHK NEWS',    color:'#b8001f'},
  livedoor:{label:'livedoor', color:'#e8501e'},
  jiji:   {label:'時事通信',    color:'#1a3a5c'},
  kyodo:  {label:'共同通信',    color:'#7a3b00'},
  bloomberg:{label:'Bloomberg',color:'#1a1410'},
  abema:  {label:'ABEMA',       color:'#1a6640'},
  khb:    {label:'KHB',         color:'#005a7a'},
};

let DB=[], curCat='all', furiOn=true, filtered=[];

/* ══ 기사 로드 ══
   1순위: articles.json (GitHub Actions가 매일 자동 갱신)
   2순위: Claude API 직접 호출 (새로고침 버튼)
*/
async function loadNews(forceRefresh=false){
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  if(!forceRefresh){
    // articles.json 시도
    try{
      const res=await fetch('./articles.json?t='+Date.now());
      if(res.ok){
        const data=await res.json();
        DB=data.articles||[];
        const updEl=document.getElementById('updatedTag');
        if(data.updated) updEl.textContent='업데이트: '+data.updated.slice(0,10);
        renderList();
        btn.classList.remove('spinning');
        return;
      }
    }catch(e){}
  }

  // articles.json 없거나 새로고침 → Claude API로 직접 수집
  await fetchViaClaude();
  btn.classList.remove('spinning');
}

async function fetchViaClaude(){
  document.getElementById('newsList').innerHTML=`
    <div class="loading"><div class="sp"></div>
    Claude API로 최신 기사 수집 중…<br>
    <span style="font-size:11px;color:#ccc">NHK・livedoor・時事通信 검색 중</span></div>`;

  const today=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-');

  try{
    /* ── 1차: web_search로 기사 수집 ── */
    const r1=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:6000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:`今日(${today})の日本のニュース記事を https://news.web.nhk/newsweb/pl/news-nwa-latest-nationwide と https://news.livedoor.com/topics/rss/top.xml から15件以上収集し、以下のJSON配列のみ返してください。他テキスト不要。

[{"id":1,"src":"nhk","cat":"politics/economy/society/international/sports/science のいずれか","date":"${today}","title":"タイトル","url":"URL","body":"本文3〜5段落（空行区切り）"}]`}]
      })
    });

    if(!r1.ok) throw new Error('API '+r1.status);
    const d1=await r1.json();

    // tool_use があれば 2차 요청
    let finalText='';
    if(d1.stop_reason==='tool_use'){
      const toolUses=d1.content.filter(b=>b.type==='tool_use');
      const toolResults=toolUses.map(tu=>({type:'tool_result',tool_use_id:tu.id,content:'検索結果を元にJSON作成してください。'}));
      const r2=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:6000,
          tools:[{type:'web_search_20250305',name:'web_search'}],
          messages:[
            {role:'user',content:`今日(${today})の日本のニュース15件以上をJSON配列で返してください。`},
            {role:'assistant',content:d1.content},
            {role:'user',content:toolResults},
          ]
        })
      });
      const d2=await r2.json();
      const tb=d2.content.find(b=>b.type==='text');
      finalText=tb?tb.text:'';
    } else {
      const tb=d1.content.find(b=>b.type==='text');
      finalText=tb?tb.text:'';
    }

    const s=finalText.indexOf('['), e=finalText.lastIndexOf(']');
    if(s===-1) throw new Error('JSON not found');
    DB=JSON.parse(finalText.slice(s,e+1));
    document.getElementById('updatedTag').textContent='방금 업데이트';
    renderList();

  }catch(err){
    document.getElementById('newsList').innerHTML=`
      <div class="err"><b>기사를 불러오지 못했습니다</b><br>${err.message}<br><br>
      <button onclick="loadNews(true)" style="font-family:'Noto Sans KR',sans-serif;font-size:11px;padding:6px 14px;background:var(--red);color:#fff;border:none;border-radius:5px;cursor:pointer">↻ 다시 시도</button></div>`;
  }
}

/* ── 목록 렌더 ── */
function renderList(){
  filtered=DB.filter(a=>curCat==='all'||a.cat===curCat);
  const cm=CAT_META[curCat]||CAT_META.all;
  document.getElementById('listLabel').textContent=curCat==='all'?'전체 기사':cm.label;
  document.getElementById('listCnt').textContent=filtered.length;
  if(!filtered.length){
    document.getElementById('newsList').innerHTML='<div class="empty">해당 기사가 없습니다</div>';
    return;
  }
  document.getElementById('newsList').innerHTML=filtered.map((a,i)=>{
    const cc=(CAT_META[a.cat]||CAT_META.all).color;
    const sm=SRC_META[a.src]||{label:a.src,color:'#555'};
    const cl=(CAT_META[a.cat]||CAT_META.all).label;
    return `<div class="news-row" onclick="openArt(${i})">
      <div class="row-top">
        <span class="row-cat" style="background:${cc}18;color:${cc}">${cl}</span>
        <span class="row-src" style="color:${sm.color}">${sm.label}</span>
        <span class="row-date">${a.date||''}</span>
      </div>
      <div class="row-title">${esc(a.title)}</div>
    </div>`;
  }).join('');
}

/* ── 기사 열기 ── */
function openArt(i){
  const a=filtered[i];if(!a)return;
  const cc=(CAT_META[a.cat]||CAT_META.all).color;
  const sm=SRC_META[a.src]||{label:a.src,color:'#555'};
  const cl=(CAT_META[a.cat]||CAT_META.all).label;
  const paras=(a.body||'').split(/\n\n+/).filter(p=>p.trim());
  document.getElementById('artContent').innerHTML=`
    <div class="art-meta">
      <span class="art-catb" style="background:${cc}18;color:${cc}">${cl}</span>
      <span class="art-srcb" style="background:${sm.color}">${sm.label}</span>
      <span class="art-date">${a.date||''}</span>
    </div>
    <h1 class="art-title">${esc(a.title)}</h1>
    <div class="art-body">${paras.map(p=>`<p>${esc(p)}</p>`).join('')}</div>
    ${a.url?`<a class="src-link" href="${esc(a.url)}" target="_blank" rel="noopener">🔗 ${sm.label} 원문 보기</a>
    <div class="src-link-note">탭하면 원문으로 이동합니다</div>`:''}`;
  document.getElementById('listView').style.display='none';
  document.getElementById('articleView').style.display='block';
  document.getElementById('backBtn').classList.add('show');
  document.getElementById('refreshBtn').style.display='none';
  window.scrollTo(0,0);
  processText(document.getElementById('artContent'));
}

/* ── 후리가나 + 사전 ── */

const DKEYS=Object.keys(DICT).sort((a,b)=>b.length-a.length);

function processText(container){
  const walker=document.createTreeWalker(container,NodeFilter.SHOW_TEXT);
  const nodes=[];let n;
  while((n=walker.nextNode()))nodes.push(n);
  nodes.forEach(node=>{
    const par=node.parentElement;if(!par)return;
    const tag=par.tagName;
    if(tag==='SCRIPT'||tag==='STYLE'||tag==='RT'||tag==='RUBY')return;
    const skip=['art-srcb','art-catb','src-link','src-link-note','row-cat','row-src','row-date','dp-n','dp-ko','dp-ja','dp-ej','dp-ek','dp-exl','credit','updated-tag'];
    if(skip.some(c=>par.classList.contains(c)))return;
    const txt=node.textContent;if(!txt.trim())return;
    if(!DKEYS.some(k=>txt.includes(k))&&!RKEYS.some(k=>txt.includes(k)))return;
    let parts=[{t:'tx',v:txt}];
    DKEYS.forEach(w=>{const nx=[];parts.forEach(p=>{if(p.t!=='tx'||!p.v.includes(w)){nx.push(p);return;}p.v.split(w).forEach((s,i,a)=>{if(s)nx.push({t:'tx',v:s});if(i<a.length-1)nx.push({t:'d',w});});});parts=nx;});
    const p2=[];parts.forEach(p=>{if(p.t!=='tx'){p2.push(p);return;}let sub=[{t:'tx',v:p.v}];RKEYS.forEach(w=>{const nx2=[];sub.forEach(s=>{if(s.t!=='tx'||!s.v.includes(w)){nx2.push(s);return;}s.v.split(w).forEach((v,i,a)=>{if(v)nx2.push({t:'tx',v});if(i<a.length-1)nx2.push({t:'r',w});});});sub=nx2;});p2.push(...sub);});
    const frag=document.createDocumentFragment();
    p2.forEach(p=>{
      if(p.t==='tx'){if(p.v)frag.appendChild(document.createTextNode(p.v));}
      else if(p.t==='d'){const sp=document.createElement('span');sp.className='w';sp.dataset.w=p.w;sp.textContent=p.w;if(RUBY[p.w]){const rb=document.createElement('ruby');rb.appendChild(sp);const rt=document.createElement('rt');rt.textContent=RUBY[p.w];rb.appendChild(rt);frag.appendChild(rb);}else frag.appendChild(sp);}
      else{const rb=document.createElement('ruby');rb.textContent=p.w;const rt=document.createElement('rt');rt.textContent=RUBY[p.w];rb.appendChild(rt);frag.appendChild(rb);}
    });
    par.replaceChild(frag,node);
  });
  container.querySelectorAll('.w').forEach(el=>{el.addEventListener('click',ev=>{ev.stopPropagation();showDp(el.dataset.w,ev.clientX,ev.clientY);});});
}

function showDp(word,x,y){
  const pop=document.getElementById('dp'),inn=document.getElementById('dpInner');
  const e=DICT[word];
  inn.innerHTML=e
    ?`<div class="dp-hdr"><span class="dp-word">${word}</span><span class="dp-read">${e.r}</span><span class="dp-pos">${e.p}</span></div><div class="dp-body">${e.m.map((m,i)=>`<div class="dp-row"><span class="dp-n">${i+1}</span><div><div class="dp-ko">${m.k}</div><div class="dp-ja">${m.j}</div></div></div>`).join('')}${e.e?`<div class="dp-ex"><div class="dp-exl">예문</div><div class="dp-ej">${e.e.j}</div><div class="dp-ek">${e.e.k}</div></div>`:''}</div>`
    :`<div class="dp-hdr"><span class="dp-word">${word}</span></div><div class="dp-body" style="font-family:'Noto Sans KR',sans-serif;font-size:11px;color:rgba(255,255,255,.45)">사전에 없는 단어입니다.</div>`;
  pop.classList.add('show');pop.style.visibility='hidden';pop.style.display='block';
  const pw=pop.offsetWidth,ph=pop.offsetHeight,vw=window.innerWidth,vh=window.innerHeight;
  let l=x-pw/2,t=y+10;if(l<8)l=8;if(l+pw>vw-8)l=vw-pw-8;if(t+ph>vh-8)t=y-ph-10;
  pop.style.left=l+'px';pop.style.top=t+'px';pop.style.visibility='visible';
}
function closeDp(){document.getElementById('dp').classList.remove('show');}
document.addEventListener('click',ev=>{const dp=document.getElementById('dp');if(dp.classList.contains('show')&&!dp.contains(ev.target)&&!ev.target.classList.contains('w'))closeDp();});

}
