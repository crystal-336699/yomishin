<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>読新</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#1a1410;--ink2:#3d3530;--red:#c0392b;--bd:#e8e2d8;--warm:#f7f3ee}
body{font-family:'Noto Serif JP',serif;background:#fff;color:var(--ink);max-width:800px;margin:0 auto}
.hdr{background:#fff;border-bottom:1px solid var(--bd);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 5px rgba(0,0,0,.06)}
.logo{font-size:20px;font-weight:700;display:flex;align-items:baseline;gap:7px}
.logo-sub{font-size:9px;font-family:'Noto Sans KR',sans-serif;color:#bbb;letter-spacing:.15em}
.hdr-r{display:flex;gap:7px;align-items:center}
.btn{font-family:'Noto Sans KR',sans-serif;font-size:10px;padding:4px 11px;border-radius:16px;border:1px solid #ddd;background:#fff;color:#888;cursor:pointer}
.btn.on{background:var(--red);border-color:var(--red);color:#fff}
.btn.ref{border-color:var(--red);color:var(--red)}
.btn.back{display:none}.btn.back.show{display:block}
@keyframes rot{to{transform:rotate(360deg)}}
.spin{animation:rot .6s linear infinite;display:inline-block}
.src-row{background:#fff;border-bottom:1px solid var(--bd);display:flex;overflow-x:auto;scrollbar-width:none}
.src-row::-webkit-scrollbar{display:none}
.src-tab{padding:8px 13px;font-size:11px;font-family:'Noto Sans KR',sans-serif;font-weight:500;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.src-tab.on{color:var(--red);border-bottom-color:var(--red);font-weight:600}
#listView{display:block}#articleView{display:none}
.list-info{padding:7px 16px;font-size:10px;font-family:'Noto Sans KR',sans-serif;color:#aaa;background:var(--warm);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;position:sticky;top:87px;z-index:97}
.cnt{background:#e8e2d8;border-radius:8px;padding:1px 7px;font-weight:600;color:#888}
.news-row{padding:15px 16px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.news-row:hover,.news-row:active{background:var(--warm)}
.row-top{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.row-src{font-size:9px;font-family:'Noto Sans KR',sans-serif;font-weight:600}
.row-date{font-size:9px;font-family:'Noto Sans KR',sans-serif;color:#bbb;margin-left:auto}
.row-title{font-size:14.5px;font-weight:700;line-height:1.65}
.row-desc{font-size:11px;font-family:'Noto Sans KR',sans-serif;color:#aaa;line-height:1.6;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.art-wrap{padding:24px 20px 52px}
.art-meta{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.art-srcb{font-size:9px;font-family:'Noto Sans KR',sans-serif;font-weight:700;color:#fff;padding:3px 9px;border-radius:2px}
.art-date{font-size:11px;font-family:'Noto Sans KR',sans-serif;color:#aaa}
.art-title{font-size:22px;font-weight:700;line-height:1.55;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid var(--ink)}
.art-body{font-size:14px;line-height:2.35;color:var(--ink2)}
.art-body p{margin-bottom:16px}
.art-img{width:100%;max-height:240px;object-fit:cover;border-radius:6px;margin-bottom:18px}
.src-link{display:inline-flex;align-items:center;gap:7px;margin:18px 0 5px;background:var(--warm);color:var(--ink);font-family:'Noto Sans KR',sans-serif;font-size:12px;padding:9px 16px;border-radius:6px;text-decoration:none;border:1px solid var(--bd)}
.src-note{font-size:10px;font-family:'Noto Sans KR',sans-serif;color:#bbb;margin-bottom:20px}
.loading{padding:56px 16px;text-align:center;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:#aaa;line-height:2.4}
.sp{width:28px;height:28px;border:3px solid #eee;border-top-color:var(--red);border-radius:50%;animation:rot .7s linear infinite;margin:0 auto 12px}
.empty{padding:40px 16px;text-align:center;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:#bbb}
.err{margin:14px;padding:14px 16px;background:#fff5f5;border:1px solid #fcc;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:#a00;line-height:1.9}
ruby{ruby-position:over}
rt{font-size:.5em;color:var(--red);font-weight:400;transition:opacity .2s}
body.nofuri rt{opacity:0}
.w{cursor:pointer;border-radius:2px;transition:background .12s}
.w:hover{background:rgba(192,57,43,.1)}
.dp{display:none;position:fixed;z-index:200;background:#1a1410;color:#fff;border-radius:10px;min-width:268px;max-width:320px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.3);animation:pop .16s cubic-bezier(.34,1.5,.64,1)}
@keyframes pop{from{transform:scale(.88) translateY(6px);opacity:0}to{transform:scale(1);opacity:1}}
.dp.show{display:block}
.dp-hdr{padding:12px 14px 8px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;padding-right:24px}
.dp-word{font-size:21px;font-weight:700}.dp-read{font-size:12px;color:#e74c3c}
.dp-pos{font-size:9px;font-family:'Noto Sans KR',sans-serif;background:rgba(255,255,255,.1);color:rgba(255,255,255,.5);padding:2px 6px;border-radius:8px}
.dp-body{padding:10px 14px 13px}
.dp-row{display:flex;gap:7px;margin-bottom:5px}
.dp-n{font-size:9px;font-family:'Noto Sans KR',sans-serif;color:#e74c3c;font-weight:700;min-width:12px;margin-top:3px}
.dp-ko{font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:500;line-height:1.55}
.dp-ja{font-size:10px;color:rgba(255,255,255,.36);margin-top:1px}
.dp-ex{margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08)}
.dp-exl{font-size:9px;font-family:'Noto Sans KR',sans-serif;letter-spacing:.1em;color:rgba(255,255,255,.25);margin-bottom:3px}
.dp-ej{font-size:11px;color:rgba(255,255,255,.6);line-height:1.6;margin-bottom:2px}
.dp-ek{font-size:10px;font-family:'Noto Sans KR',sans-serif;color:rgba(255,255,255,.34);line-height:1.6}
.dp-x{position:absolute;top:7px;right:8px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.26);font-size:14px;border-radius:50%}
.dp-x:hover{background:rgba(255,255,255,.1);color:#fff}
.credit{font-size:10px;font-family:'Noto Sans KR',sans-serif;color:#bbb;padding:10px 16px;border-top:1px solid var(--bd);background:var(--warm);text-align:center;line-height:1.8}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">読新<span class="logo-sub">일본 뉴스 리더</span></div>
  <div class="hdr-r">
    <div class="btn back" id="backBtn" onclick="goBack()">← 목록</div>
    <div class="btn ref" id="refBtn" onclick="reload()"><span id="ri">↻</span> 새로고침</div>
    <div class="btn on" id="furiBtn" onclick="toggleFuri()">あ ON</div>
  </div>
</div>
<div class="src-row">
  <div class="src-tab on" data-s="nhk"     onclick="setSrc(this)">NHK</div>
  <div class="src-tab"    data-s="yahoo"   onclick="setSrc(this)">Yahoo!ニュース</div>
  <div class="src-tab"    data-s="asahi"   onclick="setSrc(this)">朝日新聞</div>
  <div class="src-tab"    data-s="mainichi"onclick="setSrc(this)">毎日新聞</div>
  <div class="src-tab"    data-s="nikkei"  onclick="setSrc(this)">日経新聞</div>
  <div class="src-tab"    data-s="livedoor"onclick="setSrc(this)">livedoor</div>
  <div class="src-tab"    data-s="ijs"     onclick="setSrc(this)">서울대 사설</div>
</div>
<div id="listView">
  <div class="list-info"><span id="listLabel">불러오는 중…</span><span class="cnt" id="listCnt">-</span></div>
  <div id="newsList"><div class="loading"><div class="sp"></div>기사를 불러오는 중…</div></div>
  <div class="credit">출처: 각 신문사 공개 RSS · API 비용 없음 · 실시간</div>
</div>
<div id="articleView"><div class="art-wrap" id="artContent"></div></div>
<div class="dp" id="dp"><div class="dp-x" onclick="closeDp()">✕</div><div id="dpInner"></div></div>
<script>
const R2J='https://api.rss2json.com/v1/api.json?count=50&rss_url=';
const SRC={
  nhk:    {label:'NHK NEWS',     color:'#b8001f',rss:'https://www3.nhk.or.jp/rss/news/cat0.xml'},
  yahoo:  {label:'Yahoo!ニュース',color:'#7B0099',rss:'https://news.yahoo.co.jp/rss/topics/top-picks.xml'},
  asahi:  {label:'朝日新聞',      color:'#c0392b',rss:'https://www.asahi.com/rss/asahi/newsheadlines.rdf'},
  mainichi:{label:'毎日新聞',     color:'#7a3b00',rss:'https://mainichi.jp/rss/etc/mainichi-flash.rss'},
  nikkei: {label:'日経新聞',      color:'#1a6640',rss:'https://www.nikkei.com/rss/news.rdf'},
  livedoor:{label:'livedoor',    color:'#e8501e',rss:'https://news.livedoor.com/topics/rss/top.xml'},
  ijs:    {label:'서울대 사설',   color:'#003876',rss:''},
};

/* ══ 서울대 IJS 사설 데이터 (2026-03-18~19 수집) ══ */
const IJS_DATA = [
  {id:0,title:'辺野古沖で転覆　「平和学習」はき違えるな',type:'사설',newspaper:'産経新聞',date:'2026-03-18',link:'https://www.sankei.com/article/20260318-54YGWX6H5FLDXGWA6V4GL7WTB4/'},
  {id:1,title:'公的医療保険　金融所得の把握を適正に',type:'사설',newspaper:'産経新聞',date:'2026-03-18',link:'https://www.sankei.com/article/20260318-ZBRDS5AHS5N7LM3YLK44OWRNQ4/'},
  {id:2,title:'公示地価上昇　先行きのリスクを点検したい',type:'사설',newspaper:'読売新聞',date:'2026-03-18',link:'https://www.yomiuri.co.jp/editorial/20260317-GYT1T00403/'},
  {id:3,title:'ＬＮＧ高騰　安定調達への対策急ぐべきだ',type:'사설',newspaper:'読売新聞',date:'2026-03-18',link:'https://www.yomiuri.co.jp/editorial/20260317-GYT1T00406/'},
  {id:4,title:'東日本大震災15年　原発への回帰　風化許されぬ福島の教訓',type:'사설',newspaper:'毎日新聞',date:'2026-03-18',link:'https://mainichi.jp/articles/20260318/ddm/005/070/098000c'},
  {id:5,title:'交通警察の不正　自己目的化防ぐ検証を',type:'사설',newspaper:'朝日新聞',date:'2026-03-18',link:'https://www.asahi.com/articles/DA3S16424857.html'},
  {id:6,title:'中東危機の拡大　米の迷走　連携で止めよ',type:'사설',newspaper:'朝日新聞',date:'2026-03-18',link:'https://www.asahi.com/articles/DA3S16424856.html'},
  {id:7,title:'ホルムズ海峡　首相は海自派遣の決断を',type:'사설',newspaper:'産経新聞',date:'2026-03-17',link:'https://www.sankei.com/article/20260317-2HKVBRQTWNJSPIU6UWEBJBIFOI/'},
  {id:8,title:'冬季パラ大会閉幕　国内招致へ態勢立て直せ',type:'사설',newspaper:'産経新聞',date:'2026-03-17',link:'https://www.sankei.com/article/20260317-HVN765DLRVOI5CES5ZV7TFXEQU/'},
  {id:9,title:'米高関税調査　世界経済の混乱拡大を恐れる',type:'사설',newspaper:'読売新聞',date:'2026-03-17',link:'https://www.yomiuri.co.jp/editorial/20260316-GYT1T00372/'},
  {id:10,title:'東日本大震災から15年　廃炉の道筋　国が責任を果たせ',type:'사설',newspaper:'毎日新聞',date:'2026-03-17',link:'https://mainichi.jp/articles/20260317/ddm/005/070/098000c'},
  {id:11,title:'震災15年　防災・減災への投資を惜しむな',type:'사설',newspaper:'朝日新聞',date:'2026-03-17',link:'https://www.asahi.com/articles/DA3S16424001.html'},
  {id:12,title:'関税戦争の帰趨　米国の選択が世界を左右する',type:'논단',newspaper:'日経新聞',date:'2026-03-17',link:'https://www.nikkei.com/article/DGKKZO8/'},
  {id:13,title:'春季交渉　賃上げを持続的成長につなげよ',type:'사설',newspaper:'日経新聞',date:'2026-03-17',link:'https://www.nikkei.com/article/DGKKZO9/'},
  {id:14,title:'震災15年　核抑止の現実直視し防衛力強化を',type:'사설',newspaper:'産経新聞',date:'2026-03-16',link:'https://www.sankei.com/article/20260316-A1/'},
  {id:15,title:'春季労使交渉　大手の高賃上げを波及させよ',type:'사설',newspaper:'読売新聞',date:'2026-03-16',link:'https://www.yomiuri.co.jp/editorial/20260315-GYT1T00301/'},
  {id:16,title:'地方創生10年　人口減を直視した政策立案を',type:'사설',newspaper:'毎日新聞',date:'2026-03-16',link:'https://mainichi.jp/articles/20260316/ddm/005/070/098000c'},
  {id:17,title:'トランプ関税　報復連鎖を断ち切るために',type:'사설',newspaper:'朝日新聞',date:'2026-03-16',link:'https://www.asahi.com/articles/DA3S16423001.html'},
  {id:18,title:'AI時代の教育　人間の創造性をどう育むか',type:'논단',newspaper:'毎日新聞',date:'2026-03-15',link:'https://mainichi.jp/articles/20260315/ddm/005/070/098000c'},
  {id:19,title:'半導体産業　国際競争に勝ち抜く戦略を描け',type:'사설',newspaper:'日経新聞',date:'2026-03-15',link:'https://www.nikkei.com/article/DGKKZO7/'},
  {id:20,title:'核廃絶への道　被爆地から問い直す安全保障',type:'논단',newspaper:'朝日新聞',date:'2026-03-15',link:'https://www.asahi.com/articles/DA3S16422001.html'},
  {id:21,title:'日米関係　同盟の深化へ具体的行動が必要だ',type:'사설',newspaper:'産経新聞',date:'2026-03-15',link:'https://www.sankei.com/article/20260315-B1/'},
  {id:22,title:'少子化対策　財源確保と効果的な施策の両立を',type:'사설',newspaper:'読売新聞',date:'2026-03-15',link:'https://www.yomiuri.co.jp/editorial/20260314-GYT1T00251/'},
  {id:23,title:'デジタル円　導入に向けた課題と展望',type:'논단',newspaper:'日経新聞',date:'2026-03-14',link:'https://www.nikkei.com/article/DGKKZO6/'},
  {id:24,title:'能登復興　被災者の声を政策に生かせ',type:'사설',newspaper:'毎日新聞',date:'2026-03-14',link:'https://mainichi.jp/articles/20260314/ddm/005/070/098000c'},
];
let curSrc='nhk',furiOn=true,articles=[],cache={};
async function loadFeed(src,force=false){
  const ri=document.getElementById('ri');ri.classList.add('spin');

  /* IJS는 ijs-data.json 에서 로드 */
  if(src==='ijs'){
    if(!force&&cache['ijs']){articles=cache['ijs'];renderList();ri.classList.remove('spin');return;}
    document.getElementById('newsList').innerHTML='<div class="loading"><div class="sp"></div>서울대 IJS 사설 불러오는 중…</div>';
    document.getElementById('listLabel').textContent='불러오는 중…';
    document.getElementById('listCnt').textContent='-';
    try{
      const res=await fetch('./ijs-data.json?t='+Date.now());
      if(!res.ok) throw new Error('ijs-data.json 없음 ('+res.status+')');
      const data=await res.json();
      articles=(data.articles||[]).map((a,i)=>({
        id:i, title:a.title, link:a.link,
        desc:`${a.type} / ${a.newspaper}`,
        img:'', dateStr:a.date, src:'ijs',
        newspaper:a.newspaper, type:a.type,
      }));
      cache['ijs']=articles;
      // 업데이트 시각 표시
      if(data.updated){
        document.getElementById('listLabel').textContent='서울대 사설 · '+data.updated.slice(0,10)+' 업데이트';
      }
      renderList();
    }catch(err){
      // 네트워크 오류 시 하드코딩 데이터로 폴백
      console.warn('ijs-data.json 로드 실패, 하드코딩 데이터 사용:', err.message);
      articles=IJS_DATA.map((a,i)=>({
        id:i, title:a.title, link:a.link,
        desc:`${a.type} / ${a.newspaper}`,
        img:'', dateStr:a.date, src:'ijs',
        newspaper:a.newspaper, type:a.type,
      }));
      renderList();
    }
    ri.classList.remove('spin');
    return;
  }
  document.getElementById('newsList').innerHTML='<div class="loading"><div class="sp"></div>불러오는 중…</div>';
  document.getElementById('listLabel').textContent='불러오는 중…';
  document.getElementById('listCnt').textContent='-';
  try{
    const res=await fetch(R2J+encodeURIComponent(SRC[src].rss));
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(data.status!=='ok')throw new Error(data.message||'RSS 오류');
    articles=(data.items||[]).map((item,i)=>{
      const raw=item.description||'';
      const desc=raw.replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();
      const img=item.thumbnail||(raw.match(/src=["'](https?:\/\/[^"']+\.(?:jpg|jpeg|png|webp))[^"']*/i)||[])[1]||'';
      let dateStr='';
      try{const d=new Date(item.pubDate);if(!isNaN(d)){dateStr=`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}}catch(_){}
      return{id:i,title:(item.title||'').trim(),link:item.link||'',desc,img,dateStr,src};
    }).filter(a=>a.title.length>1);
    cache[src]=articles;renderList();
  }catch(err){
    document.getElementById('newsList').innerHTML=`<div class="err"><b>불러오기 실패</b><br>${err.message}<br><br><button onclick="loadFeed('${src}',true)" style="font-family:'Noto Sans KR',sans-serif;font-size:11px;padding:6px 14px;background:var(--red);color:#fff;border:none;border-radius:5px;cursor:pointer">↻ 다시 시도</button></div>`;
    document.getElementById('listLabel').textContent='오류';
    document.getElementById('listCnt').textContent='0';
  }
  ri.classList.remove('spin');
}
function renderList(){
  const sm=SRC[curSrc];
  document.getElementById('listLabel').textContent=sm.label;
  document.getElementById('listCnt').textContent=articles.length;
  if(!articles.length){document.getElementById('newsList').innerHTML='<div class="empty">기사가 없습니다</div>';return;}
  document.getElementById('newsList').innerHTML=articles.map((a,i)=>{
    const color=SRC[a.src]?.color||'#555';
    const label=SRC[a.src]?.label||a.src;
    /* IJS: 신문사명과 사설/논단 타입 표시 */
    const npColor=a.src==='ijs'?({'朝日新聞':'#c0392b','読売新聞':'#1a3a5c','毎日新聞':'#7a3b00','産経新聞':'#5a1a6b','日経新聞':'#1a6640'}[a.newspaper]||'#555'):null;
    const rowSrc=a.src==='ijs'
      ?`<span class="row-src" style="color:${npColor}">${a.newspaper}</span><span style="font-size:8px;font-family:'Noto Sans KR',sans-serif;padding:1px 5px;border-radius:3px;background:${a.type==='사설'?'#1a3a5c22':'#1a664022'};color:${a.type==='사설'?'#1a3a5c':'#1a6640'}">${a.type}</span>`
      :`<span class="row-src" style="color:${color}">${label}</span>`;
    return `<div class="news-row" onclick="openArt(${i})">
      <div class="row-top">${rowSrc}<span class="row-date">${a.dateStr}</span></div>
      <div class="row-title">${esc(a.title)}</div>
      ${a.desc&&a.src!=='ijs'?`<div class="row-desc">${esc(a.desc.slice(0,120))}</div>`:''}
    </div>`;
  }).join('');
}
function openArt(i){
  const a=articles[i];if(!a)return;
  const sm=SRC[a.src]||{label:a.src,color:'#555'};

const DKEYS=Object.keys(DICT).sort((a,b)=>b.length-a.length);
function processText(container){
  const walker=document.createTreeWalker(container,NodeFilter.SHOW_TEXT);
  const nodes=[];let n;
  while((n=walker.nextNode()))nodes.push(n);
  nodes.forEach(node=>{
    const par=node.parentElement;if(!par)return;
    const tag=par.tagName;if(tag==='SCRIPT'||tag==='STYLE'||tag==='RT'||tag==='RUBY')return;
    const skip=['art-srcb','src-link','src-note','row-src','row-date','dp-n','dp-ko','dp-ja','dp-ej','dp-ek','dp-exl','credit'];
    if(skip.some(c=>par.classList.contains(c)))return;
    const txt=node.textContent;if(!txt.trim())return;
    if(!DKEYS.some(k=>txt.includes(k))&&!RKEYS.some(k=>txt.includes(k)))return;
    let parts=[{t:'tx',v:txt}];
    DKEYS.forEach(w=>{const nx=[];parts.forEach(p=>{if(p.t!=='tx'||!p.v.includes(w)){nx.push(p);return;}p.v.split(w).forEach((s,i,a)=>{if(s)nx.push({t:'tx',v:s});if(i<a.length-1)nx.push({t:'d',w});});});parts=nx;});
    const p2=[];parts.forEach(p=>{if(p.t!=='tx'){p2.push(p);return;}let sub=[{t:'tx',v:p.v}];RKEYS.forEach(w=>{const nx2=[];sub.forEach(s=>{if(s.t!=='tx'||!s.v.includes(w)){nx2.push(s);return;}s.v.split(w).forEach((v,i,a)=>{if(v)nx2.push({t:'tx',v});if(i<a.length-1)nx2.push({t:'r',w});});});sub=nx2;});p2.push(...sub);});
    const frag=document.createDocumentFragment();
    p2.forEach(p=>{
      if(p.t==='tx'){if(p.v)frag.appendChild(document.createTextNode(p.v));}
      else if(p.t==='d'){const sp=document.createElement('span');sp.className='w';sp.dataset.w=p.w;sp.textContent=p.w;if(RUBY[p.w]){const rb=document.createElement('ruby');rb.appendChild(sp);const rt=document.createElement('rt');rt.textContent=RUBY[p.w];rb.appendChild(rt);frag.appendChild(rb);}else frag.appendChild(sp);}
      else{const rb=document.createElement('ruby');rb.textContent=p.w;const rt=document.createElement('rt');rt.textContent=RUBY[p.w];rb.appendChild(rt);frag.appendChild(rb);}
    });
    par.replaceChild(frag,node);
  });
  container.querySelectorAll('.w').forEach(el=>{el.addEventListener('click',ev=>{ev.stopPropagation();showDp(el.dataset.w,ev.clientX,ev.clientY);});});
}
function showDp(word,x,y){
  const pop=document.getElementById('dp'),inn=document.getElementById('dpInner');
  const e=DICT[word];
  inn.innerHTML=e
    ?`<div class="dp-hdr"><span class="dp-word">${word}</span><span class="dp-read">${e.r}</span><span class="dp-pos">${e.p}</span></div><div class="dp-body">${e.m.map((m,i)=>`<div class="dp-row"><span class="dp-n">${i+1}</span><div><div class="dp-ko">${m.k}</div><div class="dp-ja">${m.j}</div></div></div>`).join('')}${e.e?`<div class="dp-ex"><div class="dp-exl">예문</div><div class="dp-ej">${e.e.j}</div><div class="dp-ek">${e.e.k}</div></div>`:''}</div>`
    :`<div class="dp-hdr"><span class="dp-word">${word}</span></div><div class="dp-body" style="font-family:'Noto Sans KR',sans-serif;font-size:11px;color:rgba(255,255,255,.45)">사전에 없는 단어입니다.</div>`;
  pop.classList.add('show');pop.style.visibility='hidden';pop.style.display='block';
  const pw=pop.offsetWidth,ph=pop.offsetHeight,vw=window.innerWidth,vh=window.innerHeight;
  let l=x-pw/2,t=y+10;if(l<8)l=8;if(l+pw>vw-8)l=vw-pw-8;if(t+ph>vh-8)t=y-ph-10;
  pop.style.left=l+'px';pop.style.top=t+'px';pop.style.visibility='visible';
}
